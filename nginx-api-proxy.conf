# Nginx config for /api — fixes "Route not found" and "Session issue"
#
# IMPORTANT: proxy_pass must NOT have a path (no /api/ at end).
# If you use proxy_pass http://127.0.0.1:5000/api/;
# the backend receives /orders instead of /api/orders → "Route not found".

location /api {
    proxy_pass http://127.0.0.1:5000;   # NO trailing path — backend expects /api/orders, etc.
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;   # Required for auth
}
